services:
  # ── FastAPI Backend ─────────────────────────────────────────
  - type: web
    name: safetyhub-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free          # upgrade to starter ($7/mo) for always-on
    region: oregon      # or frankfurt, singapore
    envVars:
      - key: DATABASE_URL
        value: postgresql://postgres.slnhhsxauuvhbzynvesv:U%40H%40x3V*B8Q84.%2B@aws-1-ap-south-1.pooler.supabase.com:6543/postgres
      - key: GATEWAY_API_KEY
        generateValue: true
      - key: PORT
        value: "8000"
    healthCheckPath: /health
    autoDeploy: true

